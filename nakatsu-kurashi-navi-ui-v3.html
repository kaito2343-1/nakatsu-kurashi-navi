<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>中津くらしナビ｜本格UI版</title>
<meta name="description" content="中津市のお店・観光・暮らしを目的や現在地から探せる地域情報サイト">
<meta name="theme-color" content="#082c28">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#152421;--muted:#65736f;--line:#e3e9e6;--paper:#f4f7f5;--white:#fff;--green:#0c5149;--green2:#08796c;--orange:#ef8c36;--shadow:0 18px 55px rgba(18,49,43,.12)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);background:var(--paper);font-family:"Noto Sans JP",sans-serif;line-height:1.55}a{color:inherit;text-decoration:none}button,input{font:inherit}.shell{width:min(1180px,calc(100% - 36px));margin:auto}.topbar{background:#062f2a;color:#d8ebe6;font-size:12px}.topbar .shell{min-height:34px;display:flex;align-items:center;justify-content:space-between}.header{position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(8,44,40,.08);background:rgba(255,255,255,.91);backdrop-filter:blur(18px)}.header-in{height:76px;display:flex;align-items:center;gap:30px}.brand{display:flex;align-items:center;gap:11px;min-width:max-content}.brandmark{width:43px;height:43px;display:grid;place-items:center;border-radius:14px;color:white;background:linear-gradient(145deg,var(--green2),var(--green));box-shadow:0 10px 25px rgba(12,81,73,.2)}.brandmark svg{width:27px;fill:none;stroke:currentColor;stroke-width:2}.brand strong{display:block;font-family:"Zen Kaku Gothic New";font-size:20px;letter-spacing:.05em}.brand small{display:block;color:var(--muted);font-size:9px}.nav{display:flex;gap:25px;margin-left:auto}.nav a{font-size:13px;font-weight:700}.header-actions{display:flex;gap:8px}.round-btn{width:44px;height:44px;border:1px solid var(--line);border-radius:14px;background:white;cursor:pointer}.hero{position:relative;overflow:hidden;padding:70px 0 88px;background:linear-gradient(135deg,#f8fbfa 0%,#e5f1ed 55%,#cfe8e2 100%)}.hero:after{content:"";position:absolute;width:500px;height:500px;border:80px solid rgba(255,255,255,.35);border-radius:50%;right:-140px;top:-170px}.hero-grid{position:relative;z-index:2;display:grid;grid-template-columns:1.05fr .95fr;gap:50px;align-items:center}.eyebrow{margin:0 0 10px;color:var(--green2);font-size:12px;font-weight:800;letter-spacing:.18em}.hero h1{margin:0;font-family:"Zen Kaku Gothic New";font-size:clamp(40px,5vw,68px);line-height:1.12;letter-spacing:.02em}.hero h1 em{color:var(--green2);font-style:normal}.lead{margin:20px 0 0;color:#52635f;font-size:16px}.searchbox{display:grid;grid-template-columns:38px 1fr 110px;align-items:center;gap:8px;margin-top:30px;padding:8px 8px 8px 16px;border:1px solid rgba(8,44,40,.08);border-radius:20px;background:white;box-shadow:var(--shadow)}.searchbox span{font-size:23px}.searchbox input{height:54px;border:0;outline:0;font-size:15px}.searchbox button{height:54px;border:0;border-radius:15px;color:white;background:linear-gradient(135deg,var(--green2),var(--green));font-weight:800;cursor:pointer}.quick{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.quick button{padding:7px 11px;border:1px solid rgba(12,81,73,.14);border-radius:999px;color:var(--green);background:rgba(255,255,255,.7);font-size:11px;font-weight:700;cursor:pointer}.visual{position:relative;min-height:400px}.map-card{position:absolute;inset:20px 0 0 25px;overflow:hidden;border:9px solid rgba(255,255,255,.72);border-radius:34px;background:#d8ebe6;box-shadow:var(--shadow);transform:rotate(2deg)}.map-card:before,.map-card:after{content:"";position:absolute;background:white;opacity:.7}.map-card:before{width:130%;height:26px;left:-15%;top:44%;transform:rotate(-12deg)}.map-card:after{width:28px;height:130%;left:48%;top:-15%;transform:rotate(17deg)}.river{position:absolute;width:520px;height:105px;left:-80px;top:220px;border:22px solid #a7d9df;border-radius:50%;transform:rotate(-15deg)}.pin{position:absolute;z-index:3;padding:10px 13px;border-radius:14px;background:white;box-shadow:0 12px 30px rgba(18,49,43,.15);font-size:12px;font-weight:800}.pin:before{content:"●";margin-right:7px;color:var(--orange)}.pin1{left:80px;top:90px}.pin2{right:45px;top:165px}.pin3{left:140px;bottom:60px}.stat{position:absolute;z-index:5;right:-8px;top:18px;padding:17px 19px;border:1px solid rgba(255,255,255,.7);border-radius:18px;background:rgba(255,255,255,.88);box-shadow:var(--shadow);backdrop-filter:blur(10px)}.stat strong{display:block;font-size:24px}.stat small{color:var(--muted)}.category-wrap{position:relative;z-index:10;margin-top:-36px}.category-panel{padding:22px;border-radius:26px;background:white;box-shadow:var(--shadow)}.section-head{display:flex;align-items:end;justify-content:space-between;gap:15px;margin-bottom:17px}.section-head h2{margin:0;font-family:"Zen Kaku Gothic New";font-size:25px}.section-head p{margin:0 0 3px;color:var(--green2);font-size:10px;font-weight:800;letter-spacing:.16em}.category-list{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}.cat{min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:1px solid var(--line);border-radius:17px;background:white;cursor:pointer}.cat span{font-size:24px}.cat strong{font-size:12px}.cat small{color:var(--muted);font-size:9px}.cat.active{color:white;border-color:var(--green);background:linear-gradient(145deg,var(--green2),var(--green))}.cat.active small{color:#d8ebe6}.content{padding:65px 0 110px}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:15px;margin-bottom:20px}.result{font-weight:800}.filter-btn{padding:11px 15px;border:1px solid var(--line);border-radius:13px;background:white;font-weight:700;cursor:pointer}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{overflow:hidden;border:1px solid var(--line);border-radius:22px;background:white;box-shadow:0 8px 25px rgba(18,49,43,.06);transition:.2s}.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}.photo{position:relative;height:185px;display:grid;place-items:center;background:linear-gradient(135deg,#e1eee9,#badbd2);font-size:58px}.photo.food{background:linear-gradient(135deg,#ffe9cf,#f4bc78)}.photo.cafe{background:linear-gradient(135deg,#eee0d7,#cdb19d)}.photo.life{background:linear-gradient(135deg,#e1eafb,#b8cceb)}.badge{position:absolute;left:13px;top:13px;padding:5px 9px;border-radius:999px;color:white;background:rgba(8,44,40,.8);font-size:9px;font-weight:800}.fav{position:absolute;right:12px;top:12px;width:38px;height:38px;border:1px solid rgba(255,255,255,.7);border-radius:50%;color:white;background:rgba(8,44,40,.48);font-size:19px;cursor:pointer}.fav.on{background:var(--orange)}.card-body{padding:17px}.card h3{margin:0;font-size:17px}.desc{min-height:3.1em;margin:7px 0;color:var(--muted);font-size:11px}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}.meta span{padding:5px 8px;border-radius:999px;background:#f1f5f3;color:#53635f;font-size:9px}.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}.open{color:#087151;font-size:10px;font-weight:800}.detail{color:var(--green);font-size:11px;font-weight:800}.empty{grid-column:1/-1;padding:50px;text-align:center;color:var(--muted)}.bottomnav{display:none}.toast{position:fixed;left:50%;bottom:90px;z-index:100;transform:translate(-50%,20px);padding:12px 17px;border-radius:12px;color:white;background:#173a35;opacity:0;pointer-events:none;transition:.25s;font-size:12px}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:900px){.nav{display:none}.hero-grid{grid-template-columns:1fr}.visual{min-height:310px}.category-list{display:flex;overflow:auto}.cat{min-width:90px}.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){body{padding-bottom:76px}.topbar{display:none}.shell{width:calc(100% - 22px)}.header-in{height:64px}.brand small{display:none}.brand strong{font-size:16px}.brandmark{width:39px;height:39px}.hero{padding:48px 0 62px}.hero h1{font-size:38px}.lead{font-size:13px}.searchbox{grid-template-columns:28px 1fr 76px;padding-left:11px}.searchbox input{font-size:12px}.visual{display:none}.category-wrap{margin-top:-25px}.category-panel{padding:16px 13px;border-radius:21px}.section-head h2{font-size:21px}.content{padding-top:42px}.cards{grid-template-columns:1fr;gap:14px}.photo{height:170px}.bottomnav{position:fixed;right:0;bottom:0;left:0;z-index:80;display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(255,255,255,.95);backdrop-filter:blur(15px)}.bottomnav a{display:flex;flex-direction:column;align-items:center;gap:2px;color:#66736f;font-size:9px;font-weight:700}.bottomnav a span{font-size:20px}.bottomnav a.active{color:var(--green)}}
</style>
</head>
<body>
<div class="topbar"><div class="shell"><span>中津市のお店・観光・生活情報を、もっと探しやすく。</span><a href="business.html">店舗掲載について →</a></div></div>
<header class="header"><div class="shell header-in"><a class="brand" href="index.html"><span class="brandmark"><svg viewBox="0 0 32 32"><path d="M5 26h22M8 26V15h16v11M10 15l2-5h8l2 5M14 10l1-4h2l1 4M12 20h3m3 0h3"/></svg></span><span><strong>中津くらしナビ</strong><small>NAKATSU LOCAL GUIDE</small></span></a><nav class="nav"><a href="index.html">ホーム</a><a href="shops.html">お店を探す</a><a href="tourism.html">観光</a><a href="rankings.html">ランキング</a><a href="business.html">店舗向け</a></nav><div class="header-actions"><button class="round-btn">♡</button><button class="round-btn">☰</button></div></div></header>
<main><section class="hero"><div class="shell hero-grid"><div><p class="eyebrow">NAKATSU LOCAL DISCOVERY</p><h1>中津の毎日に、<br><em>ちょうどいい場所</em>を。</h1><p class="lead">食べる、遊ぶ、暮らす、困ったとき。<br>店名を知らなくても、目的・エリア・現在地から探せます。</p><div class="searchbox"><span>⌕</span><input id="search" type="search" placeholder="店名・カテゴリ・地域名で検索"><button id="searchBtn">検索</button></div><div class="quick"><button data-q="居酒屋">駅周辺の居酒屋</button><button data-q="からあげ">中津からあげ</button><button data-q="病院">今開いている病院</button><button id="nearBtn">⌖ 現在地から探す</button></div></div><div class="visual"><div class="map-card"><div class="river"></div><div class="pin pin1">中津駅周辺</div><div class="pin pin2">三光エリア</div><div class="pin pin3">耶馬溪</div></div><div class="stat"><strong>120+</strong><small>掲載スポット</small></div></div></div></section>
<section class="category-wrap"><div class="shell category-panel"><div class="section-head"><div><p>CATEGORY</p><h2>目的から探す</h2></div><a href="shops.html">一覧を見る →</a></div><div class="category-list" id="categories"></div></div></section>
<section class="content"><div class="shell"><div class="section-head"><div><p>RECOMMENDED</p><h2>中津のおすすめ</h2></div></div><div class="toolbar"><div class="result" id="resultText">おすすめスポット 6件</div><button class="filter-btn">絞り込み・並び替え</button></div><div class="cards" id="cards"></div></div></section></main>
<nav class="bottomnav"><a class="active" href="index.html"><span>⌂</span>ホーム</a><a href="shops.html"><span>⌕</span>探す</a><a href="tourism.html"><span>♧</span>観光</a><a href="favorites.html"><span>♡</span>保存</a><a href="business.html"><span>☰</span>その他</a></nav><div class="toast" id="toast"></div>
<script>
const categories=[['all','▦','すべて'],['飲食店','🍴','食べる'],['居酒屋','🍺','居酒屋'],['カフェ','☕','カフェ'],['病院','✚','病院'],['薬局','⚕','薬局'],['買い物','🛍','買い物'],['観光','🏯','観光']];
const places=[
{name:'元祖中津からあげ もり山',cat:'飲食店',area:'中津市',icon:'🍗',tone:'food',desc:'中津名物のからあげを気軽に楽しめる人気店。',tags:['テイクアウト','駐車場あり']},
{name:'中津駅前 居酒屋エリア',cat:'居酒屋',area:'中津駅',icon:'🍺',tone:'food',desc:'仕事帰りや観光の夜に使いやすい駅周辺スポット。',tags:['駅近','夜営業']},
{name:'耶馬溪の景勝スポット',cat:'観光',area:'耶馬溪',icon:'🏞️',tone:'',desc:'自然と歴史を感じられる中津を代表する観光エリア。',tags:['観光','写真映え']},
{name:'中津市内カフェ特集',cat:'カフェ',area:'中津市',icon:'☕',tone:'cafe',desc:'落ち着いて過ごせるカフェやスイーツ店を紹介。',tags:['ランチ','ひとりでも']},
{name:'休日・夜間の医療案内',cat:'病院',area:'中津市',icon:'🏥',tone:'life',desc:'急な体調不良の際に確認したい医療情報。',tags:['医療','現在地対応']},
{name:'イオンモール三光周辺',cat:'買い物',area:'三光',icon:'🛍️',tone:'life',desc:'買い物・食事・家族のお出かけに便利なエリア。',tags:['家族向け','駐車場あり']}
];
let selected='all';
const cats=document.getElementById('categories'),cards=document.getElementById('cards'),search=document.getElementById('search'),result=document.getElementById('resultText'),toast=document.getElementById('toast');
function renderCats(){cats.innerHTML=categories.map(([key,icon,label],i)=>`<button class="cat ${i===0?'active':''}" data-cat="${key}"><span>${icon}</span><strong>${label}</strong><small>${key==='all'?places.length:places.filter(p=>p.cat===key).length}件</small></button>`).join('');cats.querySelectorAll('.cat').forEach(b=>b.onclick=()=>{selected=b.dataset.cat;cats.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();});}
function render(){const q=search.value.trim().toLowerCase();const list=places.filter(p=>(selected==='all'||p.cat===selected)&&(!q||[p.name,p.cat,p.area,p.desc,...p.tags].join(' ').toLowerCase().includes(q)));result.textContent=`検索結果 ${list.length}件`;cards.innerHTML=list.length?list.map((p,i)=>`<article class="card"><div class="photo ${p.tone}"><span class="badge">${p.cat}</span><button class="fav" data-i="${i}">♡</button>${p.icon}</div><div class="card-body"><h3>${p.name}</h3><p class="desc">${p.desc}</p><div class="meta"><span>📍 ${p.area}</span>${p.tags.map(t=>`<span>${t}</span>`).join('')}</div><div class="card-foot"><span class="open">● 営業情報を確認</span><a class="detail" href="shops.html?q=${encodeURIComponent(p.name)}">詳しく見る →</a></div></div></article>`).join(''):'<div class="empty">条件に合うスポットが見つかりませんでした。</div>';document.querySelectorAll('.fav').forEach(b=>b.onclick=()=>{b.classList.toggle('on');b.textContent=b.classList.contains('on')?'♥':'♡';show('お気に入りを更新しました');});}
function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}
document.getElementById('searchBtn').onclick=render;search.addEventListener('keydown',e=>{if(e.key==='Enter')render()});document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{search.value=b.dataset.q;selected='all';renderCats();render()});document.getElementById('nearBtn').onclick=()=>navigator.geolocation?navigator.geolocation.getCurrentPosition(()=>show('現在地を取得しました'),()=>show('位置情報を許可してください')):show('位置情報に対応していません');renderCats();render();
</script>
</body></html>
