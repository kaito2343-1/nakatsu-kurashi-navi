<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>中津くらしナビ｜改良版UI</title>
<meta name="description" content="中津市のお店・観光・医療・生活情報を、目的や現在地から探せる地域情報サイト">
<meta name="theme-color" content="#0b3f39">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0b2848;--green:#0b4e46;--green2:#0f7568;--orange:#f39a2f;
  --cream:#f6f2e9;--paper:#fff;--ink:#15243b;--muted:#667486;--line:#e8e7e1;
  --shadow:0 18px 50px rgba(15,41,63,.12);--shadow2:0 8px 24px rgba(15,41,63,.08)
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);background:var(--cream);font-family:"Noto Sans JP",sans-serif;line-height:1.6;padding-bottom:88px}
a{color:inherit;text-decoration:none}button,input{font:inherit}.shell{width:min(1180px,calc(100% - 24px));margin:auto}
.topnote{display:none}.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(11,40,72,.08)}
.headerin{height:68px;display:flex;align-items:center;gap:14px}.brand{display:flex;align-items:center;gap:10px}.brandmark{width:40px;height:40px;display:grid;place-items:center;border-radius:13px;color:white;background:linear-gradient(145deg,var(--green2),var(--green));box-shadow:0 8px 18px rgba(11,78,70,.22)}.brandmark svg{width:26px;fill:none;stroke:currentColor;stroke-width:2}.brand strong{display:block;font-family:"Zen Kaku Gothic New";font-size:17px}.brand small{display:none;color:var(--muted);font-size:9px}.head-actions{margin-left:auto;display:flex;gap:8px}.iconbtn{width:42px;height:42px;border:1px solid var(--line);border-radius:14px;background:white;cursor:pointer}

.hero{position:relative;overflow:hidden;padding:46px 0 0;background:linear-gradient(135deg,#fff 0%,#f5f8fa 45%,#e1edf4 100%)}
.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 75% 18%,rgba(255,255,255,.9),transparent 24%)}
.hero-inner{position:relative;z-index:2}.eyebrow{margin:0 0 10px;color:#c77019;font-size:11px;font-weight:900;letter-spacing:.2em}
.hero h1{margin:0;font-family:"Zen Kaku Gothic New";font-size:clamp(38px,10vw,64px);line-height:1.22;letter-spacing:.02em;color:var(--navy)}
.hero p{margin:18px 0 0;color:#53657a;font-weight:600;font-size:14px}
.searchwrap{display:grid;grid-template-columns:28px 1fr 84px;gap:6px;align-items:center;margin-top:24px;padding:7px 7px 7px 14px;border:1px solid rgba(11,40,72,.08);border-radius:18px;background:rgba(255,255,255,.96);box-shadow:var(--shadow)}
.searchwrap span{font-size:22px}.searchwrap input{width:100%;height:50px;border:0;outline:0;background:transparent;font-size:13px}.searchwrap button{height:50px;border:0;border-radius:14px;color:white;background:linear-gradient(135deg,#ffad38,#e98517);font-weight:800;box-shadow:0 8px 18px rgba(233,133,23,.25)}
.quick{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}.quick button{border:0;background:transparent;color:var(--navy);font-size:10px;font-weight:800;padding:2px 0}.quick strong{color:var(--muted);font-weight:500}
.location-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:14px}.nearbtn,.filteropen{border:1px solid rgba(11,78,70,.15);border-radius:14px;background:white;color:var(--green);font-weight:800;min-height:46px;padding:0 14px;box-shadow:var(--shadow2)}
.hero-art{position:relative;height:330px;margin-top:14px;overflow:hidden}
.sun{position:absolute;right:18%;top:28px;width:92px;height:92px;border-radius:50%;background:rgba(245,192,93,.45)}
.mountain{position:absolute;left:-8%;right:-8%;bottom:0;height:250px;background:linear-gradient(145deg,transparent 0 34%,#b4ccd8 35% 58%,transparent 59%),linear-gradient(35deg,transparent 0 35%,#94afbe 36% 67%,transparent 68%),linear-gradient(145deg,transparent 0 44%,#7f9daa 45% 72%,transparent 73%);opacity:.95}
.river{position:absolute;left:-10%;right:-10%;bottom:0;height:110px;background:#c7e0e8;clip-path:ellipse(65% 55% at 50% 55%)}
.castle{position:absolute;right:-18px;bottom:24px;width:250px;height:210px}.castle div{position:absolute;left:50%;transform:translateX(-50%);border:6px solid var(--navy);background:#fff}.c1{width:210px;height:62px;bottom:0}.c2{width:170px;height:58px;bottom:52px}.c3{width:126px;height:52px;bottom:100px}.roof{position:absolute!important;height:0!important;border-left:56px solid transparent!important;border-right:56px solid transparent!important;border-bottom:34px solid var(--navy)!important;background:none!important}.r1{bottom:145px}.r2{bottom:95px;border-left-width:75px!important;border-right-width:75px!important}.r3{bottom:45px;border-left-width:95px!important;border-right-width:95px!important}.floatcard{position:absolute;left:14px;top:78px;display:flex;gap:10px;align-items:center;padding:12px 14px;border-radius:17px;background:rgba(255,255,255,.9);box-shadow:var(--shadow2);backdrop-filter:blur(10px)}.floatcard span{width:38px;height:38px;display:grid;place-items:center;border-radius:12px;background:#fff4e6}.floatcard strong{display:block;font-size:11px}.floatcard small{display:block;color:var(--muted);font-size:9px}

.category-section{position:relative;z-index:5;margin-top:-16px}.category-panel{padding:17px 14px 15px;border-radius:22px;background:white;box-shadow:var(--shadow)}
.sectionhead{display:flex;justify-content:space-between;align-items:end;gap:10px;margin-bottom:14px}.sectionhead p{margin:0;color:#d37b1c;font-size:10px;font-weight:900;letter-spacing:.18em}.sectionhead h2{margin:2px 0 0;font-family:"Zen Kaku Gothic New";font-size:22px}.sectionhead a{font-size:10px;font-weight:800}
.categories{display:flex;gap:9px;overflow:auto;padding-bottom:4px}.cat{flex:0 0 84px;min-height:86px;border:1px solid var(--line);border-radius:16px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.cat span{font-size:23px}.cat strong{font-size:11px}.cat small{font-size:9px;color:var(--muted)}.cat.active{color:white;border-color:var(--navy);background:linear-gradient(145deg,#144f82,#0b2848)}.cat.active small{color:#d7e5ef}

.filters{display:none;margin-top:12px;padding:14px;border-radius:16px;background:#f7faf8}.filters.show{display:block}.filter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.chip{min-height:40px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:11px;font-weight:700}.chip.on{color:#fff;border-color:var(--green);background:var(--green)}

.content{padding:42px 0}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:15px}.result{font-weight:800}.sort{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 12px;font-size:11px;font-weight:700}
.cards{display:grid;grid-template-columns:1fr;gap:14px}.card{overflow:hidden;border:1px solid var(--line);border-radius:21px;background:white;box-shadow:var(--shadow2);opacity:0;transform:translateY(18px);animation:rise .5s forwards}.card:nth-child(2){animation-delay:.08s}.card:nth-child(3){animation-delay:.16s}.card:nth-child(4){animation-delay:.24s}.card:nth-child(5){animation-delay:.32s}.card:nth-child(6){animation-delay:.4s}@keyframes rise{to{opacity:1;transform:none}}
.photo{position:relative;height:180px;overflow:hidden;background:linear-gradient(135deg,#dcebf3,#9fc3d4);display:grid;place-items:center}.photo.food{background:linear-gradient(135deg,#ffe4c1,#f3ae62)}.photo.cafe{background:linear-gradient(135deg,#ead9ce,#bb9d8b)}.photo.medical{background:linear-gradient(135deg,#e0ebf8,#a8c4df)}.photo.shopping{background:linear-gradient(135deg,#efe2ec,#d2afc5)}.photo.tourism{background:linear-gradient(135deg,#dceada,#9bc0a5)}.photo .emoji{font-size:58px;filter:drop-shadow(0 9px 14px rgba(15,41,63,.15))}
.badge{position:absolute;left:12px;top:12px;padding:5px 9px;border-radius:999px;color:#fff;background:rgba(8,31,55,.82);font-size:9px;font-weight:800}.fav{position:absolute;right:11px;top:11px;width:38px;height:38px;border:1px solid rgba(255,255,255,.7);border-radius:50%;color:white;background:rgba(8,31,55,.5);font-size:20px}.fav.on{background:var(--orange)}
.cardbody{padding:16px}.title-row{display:flex;justify-content:space-between;gap:10px;align-items:start}.card h3{margin:0;font-size:17px}.rating{white-space:nowrap;color:#d77b16;font-size:11px;font-weight:800}.desc{margin:7px 0;color:var(--muted);font-size:11px}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.meta span{padding:5px 8px;border-radius:999px;background:#f1f5f3;color:#53635f;font-size:9px}.status-row{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:12px;border-top:1px solid var(--line)}.open{color:#16805e;font-size:10px;font-weight:800}.detail{color:var(--navy);font-size:10px;font-weight:800}
.empty{padding:50px 10px;text-align:center;color:var(--muted)}

.bottomnav{position:fixed;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:80;display:grid;grid-template-columns:repeat(4,1fr);padding:10px;border-radius:24px;background:rgba(8,60,53,.97);box-shadow:0 20px 45px rgba(8,31,55,.28);backdrop-filter:blur(14px)}.bottomnav a{display:flex;flex-direction:column;align-items:center;gap:3px;color:#b9d1cc;font-size:9px;font-weight:800;padding:8px 2px;border-radius:18px}.bottomnav a span{font-size:23px}.bottomnav a.active{color:var(--navy);background:#fff}
.toast{position:fixed;left:50%;bottom:104px;z-index:120;transform:translate(-50%,18px);padding:12px 16px;border-radius:12px;color:white;background:#183c36;opacity:0;transition:.25s;font-size:12px}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(min-width:760px){body{padding-bottom:0}.topnote{display:block;background:#082e2a;color:#d8ebe6;font-size:11px}.topnote .shell{height:34px;display:flex;align-items:center;justify-content:space-between}.headerin{height:78px}.brand small{display:block}.hero{padding:72px 0 40px}.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:40px}.hero-art{height:440px;margin-top:0}.castle{width:360px;height:300px}.c1{width:300px;height:80px}.c2{width:240px;height:74px;bottom:70px}.c3{width:175px;height:66px;bottom:132px}.r1{bottom:193px}.r2{bottom:128px}.r3{bottom:64px}.floatcard{top:110px}.category-section{margin-top:-32px}.category-panel{padding:22px}.categories{display:grid;grid-template-columns:repeat(8,1fr)}.cat{min-width:0}.cards{grid-template-columns:repeat(3,1fr)}.photo{height:170px}.bottomnav{display:none}.filter-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="topnote"><div class="shell"><span>中津市のお店・観光・暮らしを、ひとつのサイトで。</span><a href="business.html">店舗・施設の掲載について →</a></div></div>
<header class="header"><div class="shell headerin">
<a class="brand" href="#"><span class="brandmark"><svg viewBox="0 0 32 32"><path d="M5 26h22M8 26V15h16v11M10 15l2-5h8l2 5M14 10l1-4h2l1 4M12 20h3m3 0h3"/></svg></span><span><strong>中津くらしナビ</strong><small>暮らし・お店・観光をもっと便利に</small></span></a>
<div class="head-actions"><button class="iconbtn">♡</button><button class="iconbtn">☰</button></div>
</div></header>

<main>
<section class="hero"><div class="shell hero-grid"><div class="hero-inner">
<p class="eyebrow">NAKATSU LOCAL GUIDE</p>
<h1>中津の「いいね！」が<br>きっと見つかる。</h1>
<p>グルメ、買い物、医療、観光。<br>店名が分からなくても、目的や地域から探せます。</p>
<div class="searchwrap"><span>⌕</span><input id="searchInput" placeholder="お店・カテゴリ・地域名で探す"><button id="searchBtn">検索</button></div>
<div class="quick"><strong>人気：</strong><button data-q="居酒屋">駅周辺の居酒屋</button><button data-q="からあげ">中津からあげ</button><button data-q="病院">病院</button></div>
<div class="location-row"><button class="nearbtn" id="nearBtn">📍 現在地から近い順</button><button class="filteropen" id="filterOpen">絞り込み</button></div>
<div class="filters" id="filters"><div class="filter-grid"><button class="chip" data-filter="parking">駐車場あり</button><button class="chip" data-filter="cashless">キャッシュレス</button><button class="chip" data-filter="open">営業中</button><button class="chip" data-filter="family">子連れ向け</button></div></div>
</div>
<div class="hero-art"><div class="sun"></div><div class="mountain"></div><div class="river"></div><div class="castle"><div class="roof r1"></div><div class="roof r2"></div><div class="roof r3"></div><div class="c3"></div><div class="c2"></div><div class="c1"></div></div><div class="floatcard"><span>🍜</span><div><strong>今日のごはん</strong><small>目的からすぐ検索</small></div></div></div>
</div></section>

<section class="category-section"><div class="shell category-panel">
<div class="sectionhead"><div><p>CATEGORY</p><h2>目的から探す</h2></div><a href="#">すべてのお店・施設を見る →</a></div>
<div class="categories" id="categories"></div>
</div></section>

<section class="content"><div class="shell">
<div class="sectionhead"><div><p>PICK UP</p><h2>おすすめのお店・スポット</h2></div></div>
<div class="toolbar"><div class="result" id="resultText"></div><select class="sort" id="sortSelect"><option value="recommended">おすすめ順</option><option value="rating">評価順</option><option value="name">名前順</option></select></div>
<div class="cards" id="cards"></div>
</div></section>
</main>

<nav class="bottomnav"><a class="active" href="#"><span>⌂</span>ホーム</a><a href="#"><span>⌕</span>検索</a><a href="#"><span>☆</span>お気に入り</a><a href="#"><span>➤</span>掲載依頼</a></nav>
<div class="toast" id="toast"></div>

<script>
const categories=[['all','▦','すべて'],['飲食店','🍴','飲食店'],['居酒屋','🍺','居酒屋'],['カフェ','☕','カフェ'],['病院','✚','病院'],['薬局','⚕','薬局'],['買い物','🛍','買い物'],['観光','🏯','観光']];
const places=[
{name:'中津からあげ専門店',cat:'飲食店',area:'中津市中心部',tone:'food',icon:'🍗',rating:4.5,desc:'中津名物の揚げたてからあげを楽しめる人気店。',tags:['テイクアウト','駐車場あり','キャッシュレス'],filters:['parking','cashless','open']},
{name:'中津駅前 居酒屋',cat:'居酒屋',area:'中津駅周辺',tone:'food',icon:'🍺',rating:4.3,desc:'仕事帰りや観光の夜に使いやすい駅近の居酒屋。',tags:['駅徒歩3分','夜営業','個室あり'],filters:['open']},
{name:'古民家カフェ',cat:'カフェ',area:'中津城周辺',tone:'cafe',icon:'☕',rating:4.6,desc:'落ち着いた空間でランチとスイーツを楽しめます。',tags:['ランチ','子連れOK','駐車場あり'],filters:['parking','family','open']},
{name:'休日・夜間医療案内',cat:'病院',area:'中津市',tone:'medical',icon:'🏥',rating:4.1,desc:'急な体調不良のときに確認しやすい医療情報。',tags:['夜間対応','現在地対応'],filters:['open']},
{name:'イオンモール三光周辺',cat:'買い物',area:'三光',tone:'shopping',icon:'🛍️',rating:4.2,desc:'買い物・食事・家族のお出かけに便利なエリア。',tags:['駐車場あり','家族向け','キャッシュレス'],filters:['parking','cashless','family','open']},
{name:'耶馬溪 観光スポット',cat:'観光',area:'耶馬溪',tone:'tourism',icon:'🏞️',rating:4.7,desc:'自然と歴史を感じられる中津を代表する観光地。',tags:['写真映え','家族向け','駐車場あり'],filters:['parking','family','open']}
];
let selected='all', activeFilters=new Set();
const cats=document.getElementById('categories'),cards=document.getElementById('cards'),search=document.getElementById('searchInput'),result=document.getElementById('resultText'),toast=document.getElementById('toast');
function renderCats(){cats.innerHTML=categories.map(([key,icon,label],i)=>`<button class="cat ${key===selected?'active':''}" data-cat="${key}"><span>${icon}</span><strong>${label}</strong><small>${key==='all'?places.length:places.filter(p=>p.cat===key).length}件</small></button>`).join('');cats.querySelectorAll('.cat').forEach(b=>b.onclick=()=>{selected=b.dataset.cat;renderCats();render();});}
function render(){
 let list=places.filter(p=>(selected==='all'||p.cat===selected));
 const q=search.value.trim().toLowerCase();
 if(q)list=list.filter(p=>[p.name,p.cat,p.area,p.desc,...p.tags].join(' ').toLowerCase().includes(q));
 if(activeFilters.size)list=list.filter(p=>[...activeFilters].every(f=>p.filters.includes(f)));
 const sort=document.getElementById('sortSelect').value;
 if(sort==='rating')list.sort((a,b)=>b.rating-a.rating); if(sort==='name')list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
 result.textContent=`検索結果 ${list.length}件`;
 cards.innerHTML=list.length?list.map((p,i)=>`<article class="card"><div class="photo ${p.tone}"><span class="badge">${p.cat}</span><button class="fav" aria-label="お気に入り">♡</button><span class="emoji">${p.icon}</span></div><div class="cardbody"><div class="title-row"><h3>${p.name}</h3><span class="rating">★ ${p.rating}</span></div><p class="desc">${p.desc}</p><div class="meta"><span>📍 ${p.area}</span>${p.tags.map(t=>`<span>${t}</span>`).join('')}</div><div class="status-row"><span class="open">● 営業中</span><a class="detail" href="#">詳しく見る →</a></div></div></article>`).join(''):'<div class="empty">条件に合うスポットが見つかりませんでした。</div>';
 document.querySelectorAll('.fav').forEach(b=>b.onclick=()=>{b.classList.toggle('on');b.textContent=b.classList.contains('on')?'♥':'♡';show('お気に入りを更新しました');});
}
function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}
document.getElementById('searchBtn').onclick=render;
search.addEventListener('keydown',e=>{if(e.key==='Enter')render()});
document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{search.value=b.dataset.q;selected='all';renderCats();render()});
document.getElementById('filterOpen').onclick=()=>document.getElementById('filters').classList.toggle('show');
document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{b.classList.toggle('on');const f=b.dataset.filter;b.classList.contains('on')?activeFilters.add(f):activeFilters.delete(f);render()});
document.getElementById('sortSelect').onchange=render;
document.getElementById('nearBtn').onclick=()=>navigator.geolocation?navigator.geolocation.getCurrentPosition(()=>show('現在地を取得しました'),()=>show('位置情報を許可してください')):show('位置情報に対応していません');
renderCats();render();
</script>
</body>
</html>
